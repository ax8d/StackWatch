<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b0f"/>
      <stop offset="55%" stop-color="#15110a"/>
      <stop offset="100%" stop-color="#0b0b0f"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8a00" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff8a00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5e00" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff5e00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd9a0"/>
      <stop offset="50%" stop-color="#ff9a3d"/>
      <stop offset="100%" stop-color="#ff5e00"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="glowText" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="round">
      <rect x="0" y="0" width="1200" height="280" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1200" height="280" fill="url(#bg)"/>

    <circle cx="200" cy="55" r="190" fill="url(#glow1)" filter="url(#blur1)">
      <animate attributeName="cx" values="180;260;180" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0.95;0.55" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1010" cy="225" r="210" fill="url(#glow2)" filter="url(#blur1)">
      <animate attributeName="cx" values="1010;940;1010" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.85;0.4" dur="5.5s" repeatCount="indefinite"/>
    </circle>

    <!-- glass panel -->
    <rect x="40" y="40" width="1120" height="200" rx="24" fill="#ffffff" opacity="0.045" stroke="#ff8a00" stroke-opacity="0.3" stroke-width="1.4"/>
    <rect x="40" y="40" width="1120" height="2" fill="#ffffff" opacity="0.10"/>

    <!-- circuit traces -->
    <g stroke="#ff8a00" stroke-width="1.4" fill="none">
      <path d="M60 235 H 290 L 320 205 H 470" stroke-opacity="0.22">
        <animate attributeName="stroke-opacity" values="0.08;0.45;0.08" dur="3.2s" repeatCount="indefinite"/>
      </path>
      <path d="M1140 55 H 905 L 875 85 H 715" stroke-opacity="0.22">
        <animate attributeName="stroke-opacity" values="0.45;0.08;0.45" dur="3.6s" repeatCount="indefinite"/>
      </path>
      <circle cx="470" cy="205" r="3" fill="#ff8a00">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="715" cy="85" r="3" fill="#ff8a00">
        <animate attributeName="opacity" values="1;0.2;1" dur="3.6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <text x="600" y="138" text-anchor="middle" font-family="Segoe UI, Verdana, Helvetica, sans-serif" font-size="66" font-weight="700" letter-spacing="1" fill="url(#textGrad)" filter="url(#glowText)">StackWatch</text>
    <text x="600" y="178" text-anchor="middle" font-family="Segoe UI, Verdana, Helvetica, sans-serif" font-size="19" fill="#ffd9b0" opacity="0.85">Tech Fingerprinting &amp; Vulnerability Scanner</text>
  </g>
</svg>
